<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Scheduler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Tab Scheduler</h1>
    </div>

    <!-- Current Tab Display -->
    <div class="current-tab" id="currentTab">
      <img id="tabFavicon" src="" alt="" class="favicon">
      <div class="tab-info">
        <div id="tabTitle" class="tab-title">Loading...</div>
        <div id="tabUrl" class="tab-url">Loading...</div>
      </div>
    </div>

    <!-- Quick Schedule Buttons -->
    <div class="quick-schedule-section">
      <h2 class="section-title">Quick Schedule</h2>
      <div class="quick-schedule-grid">
        <button class="btn-quick" data-preset="1hour">In 1 hour</button>
        <button class="btn-quick" data-preset="3hours">In 3 hours</button>
        <button class="btn-quick" data-preset="tomorrow9am">Tomorrow 9am</button>
        <button class="btn-quick" data-preset="tomorrow2pm">Tomorrow 2pm</button>
        <button class="btn-quick" data-preset="nextMonday9am">Next Monday 9am</button>
        <button class="btn-quick" data-preset="nextWeek">Next week</button>
      </div>
    </div>

    <!-- Manual Scheduling Form -->
    <div class="schedule-form">
      <h2 class="section-title">Or Pick Custom Time</h2>
      <label for="scheduleTime" class="form-label">Date and time:</label>
      <div class="datetime-wrapper">
        <input type="datetime-local" id="scheduleTime" class="datetime-input" required>
        <span class="calendar-icon">📅</span>
      </div>

      <div id="errorMessage" class="error-message"></div>

      <button id="scheduleButton" class="btn btn-primary">
        Schedule & Close Tab
      </button>
    </div>

    <!-- Scheduled Tabs List -->
    <div class="scheduled-section">
      <h2 class="section-title">Scheduled Tabs</h2>
      <div id="scheduledList" class="scheduled-list">
        <div class="empty-state">No scheduled tabs</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
