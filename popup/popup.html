<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Scheduler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Tab Scheduler</h1>
    </div>

    <!-- Current Tab Display -->
    <div class="current-tab" id="currentTab">
      <img id="tabFavicon" src="" alt="" class="favicon">
      <div class="tab-info">
        <div id="tabTitle" class="tab-title">Loading...</div>
        <div id="tabUrl" class="tab-url">Loading...</div>
      </div>
    </div>

    <!-- Quick Schedule Buttons -->
    <div class="quick-schedule-section">
      <h2 class="section-title">Quick Schedule</h2>
      <div class="quick-schedule-grid">
        <button class="btn-quick" data-preset="1hour">In 1 hour</button>
        <button class="btn-quick" data-preset="3hours">In 3 hours</button>
        <button class="btn-quick" data-preset="tomorrow9am">Tomorrow 9am</button>
        <button class="btn-quick" data-preset="tomorrow2pm">Tomorrow 2pm</button>
        <button class="btn-quick" data-preset="nextMonday9am">Next Monday 9am</button>
        <button class="btn-quick" data-preset="nextWeek">Next week</button>
      </div>
    </div>

    <!-- Custom Presets Section -->
    <div class="custom-presets-section" id="customPresetsSection">
      <h2 class="section-title">
        My Presets
        <button class="btn-add-preset" id="addPresetBtn" title="Add custom preset">+</button>
      </h2>
      <div class="custom-presets-grid" id="customPresetsGrid">
        <div class="empty-state-presets">Click + to add your first preset</div>
      </div>
    </div>

    <!-- Add/Edit Preset Form -->
    <div class="preset-form-section" id="presetFormSection" style="display: none;">
      <h2 class="section-title">Add Custom Preset</h2>
      <form id="presetForm">
        <label for="presetName" class="form-label">Preset Name:</label>
        <input type="text" id="presetName" class="preset-input" placeholder="e.g., Morning Coffee" required maxlength="20">

        <label for="presetTime" class="form-label">Time:</label>
        <input type="time" id="presetTime" class="preset-input" required>

        <label for="presetDays" class="form-label">Days Ahead:</label>
        <select id="presetDays" class="preset-input">
          <option value="0">Today</option>
          <option value="1" selected>Tomorrow</option>
          <option value="2">2 days</option>
          <option value="3">3 days</option>
          <option value="7">1 week</option>
        </select>

        <div class="preset-form-buttons">
          <button type="submit" class="btn btn-primary">Save Preset</button>
          <button type="button" class="btn btn-secondary" id="cancelPresetBtn">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Manual Scheduling Form -->
    <div class="schedule-form">
      <h2 class="section-title">Or Pick Custom Time</h2>
      <label for="scheduleTime" class="form-label">Date and time:</label>
      <div class="datetime-wrapper">
        <input type="datetime-local" id="scheduleTime" class="datetime-input" required>
        <span class="calendar-icon">📅</span>
      </div>

      <div id="errorMessage" class="error-message"></div>

      <button id="scheduleButton" class="btn btn-primary">
        Schedule & Close Tab
      </button>
    </div>

    <!-- Scheduled Tabs List -->
    <div class="scheduled-section">
      <h2 class="section-title">Scheduled Tabs</h2>
      <div id="scheduledList" class="scheduled-list">
        <div class="empty-state">No scheduled tabs</div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal" style="display: none;">
    <div class="modal-content">
      <h3 class="modal-title">Delete Preset?</h3>
      <p class="modal-message">Are you sure you want to delete "<span id="presetNameToDelete"></span>"?</p>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
